{% extends "layout.html" %}

{% block title %}
<title>Astroale | Admin Login</title>
{% endblock %}

{% block style %}
<link rel="stylesheet" href="/static/css/home.css">
<style>
    body {
        background-color: #030307;
        color: #ffffff;
        font-family: 'Space Grotesk', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
    }
    .login-container {
        background: rgba(10, 11, 20, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-top: 3px solid #00ffcc;
        border-radius: 1.2rem;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        text-align: center;
        box-sizing: border-box;
    }
    .login-container h1 {
        font-family: 'Orbitron', sans-serif;
        font-size: 26px;
        color: #00ffcc;
        margin-bottom: 25px;
        text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
    }
    .form-group {
        margin-bottom: 20px;
        text-align: left;
    }
    .form-group label {
        display: block;
        font-family: 'Orbitron', sans-serif;
        font-size: 11px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 8px;
        letter-spacing: 0.5px;
    }
    .form-group input {
        width: 100%;
        padding: 12px;
        border-radius: 0.8rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.05);
        color: #ffffff;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 16px;
        box-sizing: border-box;
        outline: none;
        transition: border-color 0.3s;
    }
    .form-group input:focus {
        border-color: #00ffcc;
        box-shadow: 0 0 8px rgba(0, 255, 204, 0.2);
    }
    .error-msg {
        color: #ff5555;
        font-size: 14px;
        margin-bottom: 20px;
    }
    .login-btn {
        width: 100%;
        padding: 12px;
        border-radius: 0.8rem;
        border: 1px solid #00ffcc;
        background: rgba(0, 255, 204, 0.08);
        color: #ffffff;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
    }
    .login-btn:hover {
        background: rgba(0, 255, 204, 0.18);
        box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
    }
    .back-link {
        display: inline-block;
        margin-top: 20px;
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        font-size: 13px;
        transition: color 0.3s;
    }
    .back-link:hover {
        color: #00ffcc;
    }
</style>
{% endblock %}

{% block body %}
<div class="login-container">
    <h1>AstroAdmin</h1>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form action="/admin/login" method="POST">
        <div class="form-group">
            <label for="password">Password di Accesso</label>
            <input type="password" id="password" name="password" required placeholder="Inserisci password...">
        </div>
        <button type="submit" class="login-btn">Accedi</button>
    </form>
    <a href="/" class="back-link">← Ritorna al sito</a>
</div>
{% endblock %}
